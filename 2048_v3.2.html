<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700;900&family=Space+Grotesk:wght@400;500;700&display=swap');

  :root{
    --bg:#cfeeff;
    --panel:#3a2e22;
    --board:#f4a6c1;
    --cell-empty: rgba(255,247,235,0.18);
    --ink:#f6ead9;
    --muted:#b8a78f;
    --muted-page:#3a4a55;
    --accent:#ff7a45;
    --accent2:#ffcf6e;

    --t2:#3d3022;
    --t4:#4a3826;
    --t8:#c97a3d;
    --t16:#d98a3f;
    --t32:#e09444;
    --t64:#e8893a;
    --t128:#e6c15a;
    --t256:#e8c44a;
    --t512:#ecc83a;
    --t1024:#f0cc2a;
    --t2048:#ff7a45;
    --t-hi:#ff4d4d;
  }

  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:
      radial-gradient(circle at 15% 10%, rgba(255,122,69,0.10), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(255,207,110,0.08), transparent 45%),
      var(--bg);
    color:var(--ink);
    font-family:'Space Grotesk', sans-serif;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior:none;
  }

  .wrap{
    max-width:480px;
    margin:0 auto;
    padding:28px 18px 40px;
    min-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  header{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:18px;
  }

  .title-row{
    display:flex;
    align-items:flex-end;
    gap:12px;
  }
  .title{
    font-family:'Fraunces', serif;
    font-weight:900;
    font-size:52px;
    line-height:0.9;
    letter-spacing:-1px;
    margin:0;
    background:linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  .title-mascot{
    height:40px;
    width:auto;
    display:block;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.25));
    transform: translateY(-2px);
  }
  .subtitle{
    font-size:12px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--muted-page);
    margin-top:4px;
  }

  .scores{
    display:flex;
    gap:8px;
  }
  .score-box{
    background:var(--panel);
    border-radius:10px;
    padding:8px 14px;
    text-align:center;
    min-width:64px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
  }
  .score-box .label{
    font-size:9px;
    letter-spacing:1.5px;
    color:var(--muted);
    text-transform:uppercase;
  }
  .score-box .value{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:20px;
    color:var(--accent2);
  }

  .controls-row{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:14px;
  }
  .hint{
    font-size:12px;
    color:var(--muted-page);
  }
  button.newgame{
    background:var(--accent);
    color:#2b1404;
    border:none;
    border-radius:8px;
    padding:9px 16px;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    letter-spacing:0.5px;
    transition:transform .12s ease, background .2s ease;
  }
  button.newgame:hover{ background:var(--accent2); }
  button.newgame:active{ transform:scale(0.95); }

  .board-frame{
    position:relative;
    width:100%;
    aspect-ratio:1/1;
    background:var(--board);
    border-radius:16px;
    padding:10px;
    touch-action:none;
    overscroll-behavior:contain;
    box-shadow:
      0 20px 50px -20px rgba(0,0,0,0.6),
      inset 0 0 0 1px rgba(255,255,255,0.05);
  }

  .grid-bg{
    position:absolute;
    inset:10px;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:10px;
  }
  .cell-bg{
    background:var(--cell-empty);
    border-radius:10px;
  }

  .tile-layer{
    position:absolute;
    inset:10px;
  }

  .tile{
    position:absolute;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
    font-family:'Fraunces', serif;
    font-weight:700;
    color:#2b1404;
    transition: top .12s cubic-bezier(.2,.7,.3,1), left .12s cubic-bezier(.2,.7,.3,1), opacity .12s ease;
    user-select:none;
  }
  .tile.spawn{ animation: pop .18s ease; }
  .tile.merged{ animation: pulse .15s ease; }

  @keyframes pop{
    0%{ transform:scale(0); opacity:0; }
    80%{ transform:scale(1.12); opacity:1;}
    100%{ transform:scale(1); }
  }
  @keyframes pulse{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.14); }
    100%{ transform:scale(1); }
  }

  .v2{ background:var(--t2); color:var(--ink);} 
  .v4{ background:var(--t4); color:var(--ink);}
  .v8{ background:var(--t8); color:#2b1404;}
  .v16{ background:var(--t16); color:#2b1404;}
  .v32{ background:var(--t32); color:#2b1404;}
  .v64{ background:var(--t64); color:#2b1404;}
  .v128{ background:var(--t128); color:#2b1404; box-shadow:0 0 16px rgba(232,193,90,0.4);}
  .v256{ background:var(--t256); color:#2b1404; box-shadow:0 0 18px rgba(232,196,74,0.5);}
  .v512{ background:var(--t512); color:#2b1404; box-shadow:0 0 20px rgba(236,200,58,0.55);}
  .v1024{ background:var(--t1024); color:#2b1404; box-shadow:0 0 24px rgba(240,204,42,0.65); font-size:0.75em !important;}
  .v2048{ background:var(--t2048); color:#fff; box-shadow:0 0 30px rgba(255,122,69,0.8); font-size:0.75em !important;}
  .vhi{ background:var(--t-hi); color:#fff; font-size:0.68em !important;}

  .overlay{
    position:absolute;
    inset:10px;
    border-radius:10px;
    background:rgba(36,27,19,0.85);
    backdrop-filter: blur(2px);
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    text-align:center;
    z-index:20;
  }
  .overlay.show{ display:flex; }
  .overlay h2{
    font-family:'Fraunces', serif;
    font-size:32px;
    margin:0;
    color:var(--accent2);
  }
  .overlay p{ margin:0; color:var(--muted); font-size:14px;}
  .overlay button{
    background:var(--accent);
    color:#2b1404;
    border:none;
    border-radius:8px;
    padding:10px 20px;
    font-weight:700;
    font-family:'Space Grotesk', sans-serif;
    cursor:pointer;
  }

  .player-tag{
    font-size:16px;
    font-weight:700;
    letter-spacing:0.5px;
    color:var(--muted-page);
    margin-top:4px;
  }
  .player-tag b{
    color:#ff7a45;
    font-size:20px;
    font-weight:900;
    font-family:'Fraunces', serif;
  }

  .name-choice-row{
    display:flex;
    gap:12px;
  }
  .name-choice-row button{
    background:var(--panel);
    color:var(--accent2);
    border:2px solid var(--accent);
    border-radius:10px;
    padding:12px 22px;
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:18px;
    cursor:pointer;
    transition:transform .12s ease, background .2s ease;
  }
  .name-choice-row button:hover{
    background:var(--accent);
    color:#2b1404;
    transform:translateY(-2px);
  }

  .leaderboard-btn{
    background:transparent;
    color:var(--ink);
    border:1px solid rgba(255,255,255,0.25);
    border-radius:8px;
    padding:9px 14px;
    font-family:'Space Grotesk', sans-serif;
    font-weight:500;
    font-size:13px;
    cursor:pointer;
  }
  .leaderboard-btn:hover{ border-color: var(--accent); color:var(--accent2); }

  .lb-list{
    width:100%;
    max-width:280px;
    text-align:left;
    max-height:240px;
    overflow-y:auto;
    margin:4px 0;
  }
  .lb-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:7px 10px;
    border-radius:8px;
    font-size:13px;
    background:rgba(255,255,255,0.55);
    margin-bottom:5px;
  }
  .lb-row .rank{ color:#0d2a4d; width:22px; font-weight:600; }
  .lb-row .nm{ flex:1; color:#0d2a4d; font-weight:600; }
  .lb-row .sc{ color:#15396b; font-weight:700; font-family:'Fraunces', serif; }
  .lb-empty{ color:var(--muted); font-size:13px; padding:10px 0; }

  footer{
    margin-top:18px;
    font-size:12px;
    color:var(--muted-page);
    text-align:center;
    line-height:1.6;
  }
  footer b{ color:#1e2f3a; }

  .author-credit{
    position:fixed;
    right:14px;
    bottom:10px;
    font-size:12px;
    color:#5b7a8c;
    letter-spacing:0.5px;
    z-index:5;
  }

  .milestone-popup{
    position:fixed;
    top:18%;
    left:50%;
    transform:translate(-50%, -10px) scale(0.9);
    background:linear-gradient(135deg, var(--accent2), var(--accent));
    color:#2b1404;
    font-family:'Fraunces', serif;
    font-weight:900;
    font-size:24px;
    padding:14px 28px;
    border-radius:14px;
    box-shadow:0 18px 40px -12px rgba(0,0,0,0.4);
    opacity:0;
    pointer-events:none;
    transition:opacity .12s ease, transform .12s ease;
    z-index:50;
    white-space:nowrap;
  }
  .milestone-popup.show{
    opacity:1;
    transform:translate(-50%, 0) scale(1);
  }

  @media (max-width:380px){
    .title{ font-size:40px; }
  }
</style>
</head>

<script>
(function(){
  const SIZE = 4;
  const tileLayer = document.getElementById('tileLayer');
  const gridBg = document.getElementById('gridBg');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlaySub = document.getElementById('overlaySub');
  const overlayBtn = document.getElementById('overlayBtn');
  const newGameBtn = document.getElementById('newGameBtn');
  const boardFrame = document.getElementById('boardFrame');
  const milestonePopup = document.getElementById('milestonePopup');
  const playerOverlay = document.getElementById('playerOverlay');
  const leaderboardOverlay = document.getElementById('leaderboardOverlay');
  const leaderboardBtn = document.getElementById('leaderboardBtn');
  const lbCloseBtn = document.getElementById('lbCloseBtn');
  const lbList = document.getElementById('lbList');
  const playerTag = document.getElementById('playerTag');

  let currentPlayer = null;

  // Milestone scores: 200, 500, then every 500 from 1000 upward
  const MILESTONES = [100, 200, 500, 1000, 1500, 2000, 2500, 3000, 3500, 4000, 4500, 5000, 6000, 7000, 8000, 9000, 10000];
  let lastMilestoneIndex = -1;
  let milestoneTimer = null;

  let board, score, best, won, over, tileId;

  // build static grid background
  for(let i=0;i<SIZE*SIZE;i++){
    const c = document.createElement('div');
    c.className = 'cell-bg';
    gridBg.appendChild(c);
  }

  let memoryLeaderboard = [];

  function loadLeaderboard(){
    try{
      const raw = localStorage.getItem('2048-leaderboard');
      if(raw === null) return memoryLeaderboard.slice();
      return JSON.parse(raw);
    }
    catch(e){ return memoryLeaderboard.slice(); }
  }
  function saveLeaderboard(list){
    memoryLeaderboard = list.slice();
    try{ localStorage.setItem('2048-leaderboard', JSON.stringify(list)); }catch(e){}
  }
  function addScoreToLeaderboard(name, sc){
    if(!name || sc <= 0) return;
    const list = loadLeaderboard();
    list.push({ name, score: sc, date: new Date().toLocaleDateString('zh-CN') });
    list.sort((a,b)=> b.score - a.score);
    saveLeaderboard(list.slice(0, 50));
  }
  function bestForPlayer(name){
    const list = loadLeaderboard().concat([BASELINE_ENTRY]);
    let m = 0;
    list.forEach(e=>{ if(e.name===name && e.score>m) m = e.score; });
    return m;
  }
  const BASELINE_ENTRY = { name: '卢旭', score: 2048, date: '基准记录' };

  function renderLeaderboard(){
    const stored = loadLeaderboard();
    const list = stored.concat([BASELINE_ENTRY]).sort((a,b)=> b.score - a.score).slice(0, 10);
    if(list.length===0){
      lbList.innerHTML = '<div class="lb-empty">暂无记录，快去玩一局吧！</div>';
      return;
    }
    lbList.innerHTML = list.map((e,i)=>
      '<div class="lb-row"><span class="rank">'+(i+1)+'</span><span class="nm">'+e.name+'</span><span class="sc">'+e.score+'</span></div>'
    ).join('');
  }

  function newGame(){
    if(!currentPlayer) return;
    board = Array.from({length:SIZE}, ()=>Array(SIZE).fill(null));
    score = 0;
    won = false;
    over = false;
    tileId = 1;
    lastMilestoneIndex = -1;
    overlay.classList.remove('show');
    addRandomTile();
    addRandomTile();
    render(true);
    updateScore();
  }

  function addRandomTile(){
    const empties = [];
    for(let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) if(!board[r][c]) empties.push([r,c]);
    if(empties.length===0) return;
    const [r,c] = empties[Math.floor(Math.random()*empties.length)];
    board[r][c] = { id: tileId++, value: Math.random()<0.9?2:4, r, c, isNew:true, merged:false };
  }

  function cellSize(){
    // tile-layer inset 10px both sides of board-frame padding 10px -> width = frame width - 20
    const frameRect = boardFrame.getBoundingClientRect();
    const inner = frameRect.width - 20; // matches inset:10px
    const gap = 10;
    const size = (inner - gap*(SIZE-1)) / SIZE;
    return { size, gap };
  }

  function tileClassForValue(v){
    if(v <= 2048) return 'v'+v;
    return 'vhi';
  }

  function render(initial){
    if(!board) return;
    tileLayer.innerHTML = '';
    const {size, gap} = cellSize();
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        const t = board[r][c];
        if(!t) continue;
        const el = document.createElement('div');
        el.className = 'tile ' + tileClassForValue(t.value);
        el.style.width = size+'px';
        el.style.height = size+'px';
        el.style.top = (r*(size+gap))+'px';
        el.style.left = (c*(size+gap))+'px';
        const fontSize = t.value >= 1000 ? size*0.34 : size*0.42;
        el.style.fontSize = fontSize+'px';
        el.textContent = t.value;
        if(t.isNew) { el.classList.add('spawn'); t.isNew=false; }
        if(t.merged) { el.classList.add('merged'); t.merged=false; }
        tileLayer.appendChild(el);
      }
    }
  }

  function updateScore(){
    scoreEl.textContent = score;
    if(score > best){
      best = score;
    }
    bestEl.textContent = best;
    checkMilestone();
  }

  function checkMilestone(){
    // show popup for each newly crossed milestone (only the latest if multiple crossed at once)
    for(let i=lastMilestoneIndex+1;i<MILESTONES.length;i++){
      if(score >= MILESTONES[i]){
        lastMilestoneIndex = i;
        showMilestonePopup();
      } else {
        break;
      }
    }
  }

  function showMilestonePopup(){
    if(milestoneTimer) clearTimeout(milestoneTimer);
    milestonePopup.classList.add('show');
    milestoneTimer = setTimeout(function(){
      milestonePopup.classList.remove('show');
    }, 300);
  }

  function cloneBoardValues(){
    return board.map(row => row.map(t => t? t.value : 0));
  }

  // returns true if board changed
  function move(dir){
    if(over || !currentPlayer) return;
    // dir: 'up','down','left','right'
    let moved = false;
    const before = cloneBoardValues();

    function getLine(i, dir){
      // returns array of cells (r,c) in order from far edge toward near, for traversal we want order: move tiles towards dir
    }

    // We'll implement via transposing/reversing approach.
    function getRow(r){ return board[r]; }

    function compressAndMergeLine(line){
      // line is array of tile-or-null, in the direction of movement (index0 = destination end)
      let arr = line.filter(t => t);
      let result = [];
      let gained = 0;
      for(let i=0;i<arr.length;i++){
        if(i < arr.length-1 && arr[i].value === arr[i+1].value){
          const merged = { id: tileId++, value: arr[i].value*2, merged:true, isNew:false };
          gained += merged.value;
          result.push(merged);
          if(merged.value === 2048) won = true;
          i++; // skip next
        } else {
          arr[i].merged = false;
          result.push(arr[i]);
        }
      }
      while(result.length < SIZE) result.push(null);
      return { result, gained };
    }

    let totalGain = 0;

    if(dir === 'left' || dir === 'right'){
      for(let r=0;r<SIZE;r++){
        let line = board[r].slice();
        if(dir==='right') line.reverse();
        const {result, gained} = compressAndMergeLine(line);
        totalGain += gained;
        if(dir==='right') result.reverse();
        board[r] = result;
      }
    } else {
      for(let c=0;c<SIZE;c++){
        let line = [];
        for(let r=0;r<SIZE;r++) line.push(board[r][c]);
        if(dir==='down') line.reverse();
        const {result, gained} = compressAndMergeLine(line);
        totalGain += gained;
        if(dir==='down') result.reverse();
        for(let r=0;r<SIZE;r++) board[r][c] = result[r];
      }
    }

    // update r,c on tiles
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        if(board[r][c]){ board[r][c].r = r; board[r][c].c = c; }
      }
    }

    const after = cloneBoardValues();
    moved = JSON.stringify(before) !== JSON.stringify(after);

    if(moved){
      score += totalGain;
      addRandomTile();
      render();
      updateScore();
      if(won){
        showOverlay(true);
        won = false; // allow continue play but don't show again automatically
      } else if(isGameOver()){
        over = true;
        showOverlay(false);
      }
    }
  }

  function isGameOver(){
    for(let r=0;r<SIZE;r++){
      for(let c=0;c<SIZE;c++){
        if(!board[r][c]) return false;
        const v = board[r][c].value;
        if(c<SIZE-1 && board[r][c+1] && board[r][c+1].value===v) return false;
        if(r<SIZE-1 && board[r+1][c] && board[r+1][c].value===v) return false;
      }
    }
    return true;
  }

  function showOverlay(isWin){
    addScoreToLeaderboard(currentPlayer, score);
    overlayTitle.textContent = isWin ? '你赢了！' : '游戏结束';
    overlaySub.textContent = isWin ? '已凑出 2048，继续挑战更高分吧 · 得分已保存' : '没有可移动的空间了 · 得分已保存';
    overlayBtn.textContent = isWin ? '继续游戏' : '再来一局';
    overlay.classList.add('show');
    overlayBtn.onclick = function(){
      if(isWin){ overlay.classList.remove('show'); }
      else { newGame(); }
    };
  }

  // keyboard
  window.addEventListener('keydown', function(e){
    const map = {
      'ArrowUp':'up','ArrowDown':'down','ArrowLeft':'left','ArrowRight':'right',
      'w':'up','s':'down','a':'left','d':'right',
      'W':'up','S':'down','A':'left','D':'right'
    };
    if(map[e.key]){
      e.preventDefault();
      move(map[e.key]);
    } else if((e.key === 'r' || e.key === 'R') && currentPlayer){
      newGame();
    }
  });

  // touch
  let touchStartX=0, touchStartY=0, touchActive=false;
  boardFrame.addEventListener('touchstart', function(e){
    if(e.touches.length!==1) return;
    touchActive = true;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive:false});

  boardFrame.addEventListener('touchmove', function(e){
    if(touchActive) e.preventDefault();
  }, {passive:false});

  boardFrame.addEventListener('touchend', function(e){
    if(!touchActive) return;
    touchActive = false;
    const touch = e.changedTouches[0];
    const dx = touch.clientX - touchStartX;
    const dy = touch.clientY - touchStartY;
    const absX = Math.abs(dx), absY = Math.abs(dy);
    const threshold = 24;
    if(Math.max(absX,absY) < threshold) return;
    if(absX > absY){
      move(dx>0 ? 'right' : 'left');
    } else {
      move(dy>0 ? 'down' : 'up');
    }
  }, {passive:false});

  newGameBtn.addEventListener('click', function(){
    if(!currentPlayer){ return; }
    newGame();
  });

  // player selection
  playerOverlay.querySelectorAll('.name-choice-row button').forEach(btn=>{
    btn.addEventListener('click', function(){
      currentPlayer = btn.getAttribute('data-name');
      playerTag.innerHTML = '当前玩家：<b>' + currentPlayer + '</b>';
      best = bestForPlayer(currentPlayer);
      bestEl.textContent = best;
      playerOverlay.classList.remove('show');
      newGame();
    });
  });

  // leaderboard
  leaderboardBtn.addEventListener('click', function(){
    renderLeaderboard();
    leaderboardOverlay.classList.add('show');
  });
  lbCloseBtn.addEventListener('click', function(){
    leaderboardOverlay.classList.remove('show');
  });

  window.addEventListener('resize', ()=>render());

  best = 0;
})();
</script>
